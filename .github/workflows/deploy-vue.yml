name: 🚀 Deploy — Comida Rapidita Vue

# ─────────────────────────────────────────────────────────────
#  Repo   : luisalvaradodev10s/comida-rapidita-react
#  URL    : https://luisalvaradodev10s.github.io/comida-rapidita-react/vue/
# ─────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      - 'comida-rapidita-vue/**'
      - '.github/workflows/deploy-vue.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-vue
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  WORKING_DIR: comida-rapidita-vue
  VITE_BASE: /comida-rapidita-react/vue/

jobs:
  build:
    name: 🔨 Build Vue
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json

      - name: 📦 Instalar dependencias
        working-directory: ${{ env.WORKING_DIR }}
        run: npm ci

      - name: 🏗️ Build producción
        working-directory: ${{ env.WORKING_DIR }}
        run: npm run build
        env:
          VITE_BASE_URL: ${{ env.VITE_BASE }}

      - name: 🔧 Agregar 404.html (SPA fallback)
        run: cp ${{ env.WORKING_DIR }}/dist/index.html ${{ env.WORKING_DIR }}/dist/404.html

      - name: 📤 Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.WORKING_DIR }}/dist

  deploy:
    name: 🌐 GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: 🚀 Deploy
        id: deploy
        uses: actions/deploy-pages@v4

      - name: 🔗 URL del sitio
        run: echo "✅ Vue disponible en: ${{ steps.deploy.outputs.page_url }}"
