name: "🚀 Deploy — Comida Rapidita React"

# Repo   : luisalvaradodev10s/comida-rapidita-react
# URL    : https://luisalvaradodev10s.github.io/comida-rapidita-react/
# Branch : main

on:
  push:
    branches: [main]
    paths:
      - 'comida-rapidita-react/**'
      - '.github/workflows/deploy-react.yml'
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-react
  cancel-in-progress: true

env:
  NODE_VERSION: '21'
  WORKING_DIR: .
  VITE_BASE: /comida-rapidita-react/

jobs:
  build:
    name: 🔨 Build React
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Setup Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: package-lock.json

      - name: 📦 Install dependencies
        working-directory: ${{ env.WORKING_DIR }}
        run: npm ci

      - name: 🧪 Optional test (uncomment si es necesario)
        working-directory: ${{ env.WORKING_DIR }}
        run: npm test -- --watchAll=false
        continue-on-error: true

      - name: 🏗️ Build production
        working-directory: ${{ env.WORKING_DIR }}
        run: npm run build
        env:
          VITE_BASE_URL: ${{ env.VITE_BASE }}

      - name: 🔧 Add 404 fallback (SPA)
        run: cp ${{ env.WORKING_DIR }}/dist/index.html ${{ env.WORKING_DIR }}/dist/404.html

      - name: 📤 Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.WORKING_DIR }}/dist

  deploy:
    name: 🌐 Deploy to GitHub Pages
    runs-on: ubuntu-latest
    needs: build

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: 🚀 Deploy
        id: deploy
        uses: actions/deploy-pages@v4

      - name: 🔗 Deployment output
        run: |
          echo "✅ Sitio desplegado en: ${{ steps.deploy.outputs.page_url }}"
          echo "🌐 React app: https://luisalvaradodev10s.github.io/comida-rapidita-react/"
          
