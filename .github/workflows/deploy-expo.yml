name: 🚀 Deploy — Comida Rapidita Expo Web

# ─────────────────────────────────────────────────────────────
#  Repo   : luisalvaradodev10s/comida-rapidita-react
#  URL    : https://luisalvaradodev10s.github.io/comida-rapidita-react/expo/
# ─────────────────────────────────────────────────────────────

on:
  push:
    branches: [main]
    paths:
      - 'comida-rapidita-expo/**'
      - '.github/workflows/deploy-expo.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages-expo
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  WORKING_DIR: comida-rapidita-expo

jobs:
  build:
    name: 🔨 Build Expo Web
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Checkout
        uses: actions/checkout@v4

      - name: 🟢 Node.js ${{ env.NODE_VERSION }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: ${{ env.WORKING_DIR }}/package-lock.json

      - name: 📦 Instalar dependencias
        working-directory: ${{ env.WORKING_DIR }}
        run: npm ci

      - name: 🌐 Expo CLI
        run: npm install -g @expo/cli

      - name: 🏗️ Export web
        working-directory: ${{ env.WORKING_DIR }}
        run: npx expo export --platform web

      - name: 📤 Subir artefacto
        uses: actions/upload-pages-artifact@v3
        with:
          path: ${{ env.WORKING_DIR }}/dist

  deploy:
    name: 🌐 GitHub Pages
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}

    steps:
      - name: 🚀 Deploy
        id: deploy
        uses: actions/deploy-pages@v4

      - name: 🔗 URL del sitio
        run: echo "✅ Expo Web disponible en: ${{ steps.deploy.outputs.page_url }}"
